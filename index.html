<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@^19.2.4",
        "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
        "react/": "https://esm.sh/react@^19.2.4/",
        "@google/genai": "https://esm.sh/@google/genai@^1.41.0",
        "lucide-react": "https://esm.sh/lucide-react@^0.564.0"
      }
    }
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
    <meta name="theme-color" content="#FDFCF8" />
    <title>EventHorizon</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Maps API -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBD59jFtFrtaPeISD2-senc5fHvzXY4qzU&libraries=places"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'],
              serif: ['"Playfair Display"', 'serif'],
            },
            colors: {
              primary: '#2D3436',
              accent: '#F08080',
              paper: '#FDFCF8',
              watercolor: {
                art: '#FCE7F3',
                music: '#F3E8FF',
                food: '#FFEDD5',
                tech: '#E0F2FE',
                party: '#FEF9C3',
                wellness: '#DCFCE7',
              }
            },
            boxShadow: {
              'watercolor': '0 20px 50px rgba(0, 0, 0, 0.05)',
              'ios': '0 4px 20px rgba(0, 0, 0, 0.08)',
              'ios-deep': '0 12px 40px rgba(0, 0, 0, 0.12)',
              'glow-emerald': '0 0 15px rgba(16, 185, 129, 0.4)',
              'glow-sunset': '0 0 12px rgba(240, 128, 128, 0.3)',
            },
            animation: {
              'float': 'float 4s ease-in-out infinite',
              'watercolor-bleed': 'watercolorBleed 1.2s cubic-bezier(0.25, 1, 0.5, 1) forwards',
              'fade-in': 'fadeIn 0.4s cubic-bezier(0.25, 1, 0.5, 1) forwards',
              'scale-in': 'scaleInBounce 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
              'reveal-stagger': 'revealStaggerBounce 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
              'slide-up': 'slideUp 0.5s cubic-bezier(0.25, 1, 0.5, 1) forwards',
            },
            keyframes: {
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-12px)' },
              },
              watercolorBleed: {
                '0%': { opacity: '0', transform: 'scale(1.05)' },
                '100%': { opacity: '1', transform: 'scale(1)' },
              },
              slideUp: {
                '0%': { opacity: '0', transform: 'translateY(20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              scaleInBounce: {
                '0%': { transform: 'scale(0.85)', opacity: '0' },
                '100%': { transform: 'scale(1)', opacity: '1' },
              },
              revealStaggerBounce: {
                '0%': { opacity: '0', transform: 'translateY(20px) scale(0.95)' },
                '100%': { opacity: '1', transform: 'translateY(0) scale(1)' },
              }
            }
          },
        },
      }
    </script>
    <style>
      body {
        background-color: #FDFCF8;
        color: #2D3436;
        overscroll-behavior: none;
        -webkit-font-smoothing: antialiased;
        background-image: 
          radial-gradient(at 0% 0%, rgba(252, 231, 243, 0.4) 0, transparent 60%),
          radial-gradient(at 100% 0%, rgba(224, 242, 254, 0.4) 0, transparent 60%),
          radial-gradient(at 0% 100%, rgba(220, 252, 231, 0.35) 0, transparent 60%),
          radial-gradient(at 100% 100%, rgba(255, 237, 213, 0.35) 0, transparent 60%),
          radial-gradient(at 50% 50%, rgba(243, 232, 255, 0.3) 0, transparent 70%),
          radial-gradient(at 20% 40%, rgba(254, 249, 195, 0.25) 0, transparent 50%),
          radial-gradient(at 80% 60%, rgba(252, 231, 243, 0.25) 0, transparent 50%),
          url("https://www.transparenttextures.com/patterns/paper-fibers.png");
        background-attachment: fixed;
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      .perspective-1000 {
        perspective: 1000px;
      }
      .preserve-3d {
        transform-style: preserve-3d;
      }
      .backface-hidden {
        backface-visibility: hidden;
        -webkit-backface-visibility: hidden;
      }
      .rotate-y-180 {
        transform: rotateY(180deg);
      }
      .tap-scale:active {
        transform: scale(0.94);
        transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }
      .stagger-1 { animation-delay: 0.1s; }
      .stagger-2 { animation-delay: 0.15s; }
      .stagger-3 { animation-delay: 0.2s; }
      .stagger-4 { animation-delay: 0.25s; }
      
      .bg-sunset-gradient {
        background: linear-gradient(135deg, #FA8072 0%, #F08080 100%);
      }
      
      .vertical-text {
        writing-mode: vertical-rl;
        text-orientation: mixed;
      }
    </style>
  <link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
